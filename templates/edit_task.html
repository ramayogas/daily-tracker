{% extends "base.html" %}

{% block title %}
Edit Task
{% endblock %}

{% block body %}

<div class="max-w-3xl mx-auto">

    <div class="flex justify-between items-center mb-8">

        <h1 class="text-3xl font-bold">
            Edit Task
        </h1>

        <a
            href="/tasks"
            class="text-gray-500"
        >
            ← Back
        </a>

    </div>


    <div class="bg-white rounded-2xl shadow p-6">

        <form
            method="POST"
            class="space-y-4"
        >

            <input
                type="text"
                name="title"
                value="{{ task.title }}"
                required
                class="w-full border rounded-lg px-4 py-3"
            >


            <div class="grid grid-cols-2 gap-4">

                <select
                    name="category_id"
                    class="border rounded-lg px-4 py-3"
                >

                    <option value="">
                        No Category
                    </option>

                    {% for category in categories %}

                    <option
                        value="{{ category.id }}"
                        {% if task.category_id == category.id %}
                            selected
                        {% endif %}
                    >
                        {{ category.name }}
                    </option>

                    {% endfor %}

                </select>


                <select
                    name="urgency"
                    class="border rounded-lg px-4 py-3"
                >

                    <option
                        {% if task.urgency == "Low" %}
                        selected
                        {% endif %}
                    >
                        Low
                    </option>

                    <option
                        {% if task.urgency == "Medium" %}
                        selected
                        {% endif %}
                    >
                        Medium
                    </option>

                    <option
                        {% if task.urgency == "High" %}
                        selected
                        {% endif %}
                    >
                        High
                    </option>

                    <option
                        {% if task.urgency == "Critical" %}
                        selected
                        {% endif %}
                    >
                        Critical
                    </option>

                </select>

            </div>


            <input
                type="datetime-local"
                name="due_date"
                value="{% if task.due_date %}{{ task.due_date.strftime('%Y-%m-%dT%H:%M') }}{% endif %}"
                class="w-full border rounded-lg px-4 py-3"
            >


            <textarea
                name="note"
                class="w-full border rounded-lg px-4 py-3"
                rows="5"
            >{{ task.note or '' }}</textarea>


            <button
                type="submit"
                class="bg-black text-white px-6 py-3 rounded-lg"
            >
                Save Changes
            </button>

        </form>

    </div>

</div>

{% endblock %}
